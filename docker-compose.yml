version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "llama3.2:3b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5000:5000"
    depends_on:
      ollama:
        condition: service_healthy
      sqlserver:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=LearnPlatform;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Development
      - Cors__AllowedOrigins__0=http://localhost:3000
      - Cors__AllowedOrigins__1=http://localhost:8081
      - Jwt__Key=YourSuperSecretKeyForDevelopment1234567890
      - Jwt__Issuer=LearnPlatform
      - Jwt__Audience=LearnPlatformApp
      - Ollama__BaseUrl=http://ollama:11434
      - Ollama__Model=llama3.2:3b
      - Ollama__TimeoutSeconds=120
      - DailySubmissionLimit=50

volumes:
  sqldata:
  ollama_data:
